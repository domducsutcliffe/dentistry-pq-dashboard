name: Refresh dentistry PQ data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1-5"
    - cron: "0,30 6-8 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Refresh committed dashboard data
        env:
          # Lets the refresh decrypt the committed .enc to find its prior state and
          # run the fast incremental path instead of a full rebuild every run.
          PQ_PASSWORD: ${{ secrets.PQ_PASSWORD }}
          # Pace the (now rare) full-rebuild answer enrichment to avoid the
          # Cloudflare rate limit; incremental runs only enrich a handful.
          ANSWER_CONCURRENCY: "2"
          ANSWER_DELAY_MS: "250"
        run: node scripts/refresh-data.mjs
      - name: Encrypt data files
        env:
          PQ_PASSWORD: ${{ secrets.PQ_PASSWORD }}
        run: node scripts/encrypt-data.mjs
      - name: Commit data changes
        run: |
          if git diff --quiet -- data/dentistry/*.enc data/constituency-regions.json; then
            echo "No dentistry PQ data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dentistry/*.enc data/constituency-regions.json
          git commit -m "Refresh dentistry PQ dashboard data"
          git push


name: Refresh dentistry PQ data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Refresh committed dashboard data
        run: node scripts/refresh-data.mjs
      - name: Commit data changes
        run: |
          if git diff --quiet -- data/questions.json data/summary.json data/constituency-regions.json; then
            echo "No dentistry PQ data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/questions.json data/summary.json data/constituency-regions.json
          git commit -m "Refresh dentistry PQ dashboard data"
          git push
